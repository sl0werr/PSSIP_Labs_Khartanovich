<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРИАНТ №19</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background-color: #f0f0f0;
        }
        
        .template {
            width: 1920px;
            height: 1080px;
            display: flex;
            flex-direction: column;
            border: 2px solid #333;
        }
        
        .top-row {
            display: flex;
            height: 100px;
        }
        
        .middle-row {
            display: flex;
            height: 293px;
        }
        
        .bottom-row {
            height: 100px;
        }
        
        .block {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            border: 1px solid #000;
            box-sizing: border-box;
        }
        
        .block-1 {
            width: 500px;
            background-color: #FF9999;
        }
        
        .block-6 {
            width: 100%;
            background-color: #99FFFF;
        }
        
        .block-4 {
            width:1420px;
            height: 880px;
            background-color: #FFFF99;
            margin-top: -586px;
            margin-left: auto;
        }
        
        .block-2 {
            width: 500px;
            background-color: #99FF99;
        }
        
        .block-3 {
            width: 500px;
            background-color: #9999FF;
        }
        
        .block-5 {
            width: 100%;
            height: 100%;
            background-color: #FF99FF;
        }
    </style>
</head>
<body>



    <div class="template">

        <div class="top-row">
            <div class="block block-6">шапка</div>
        </div>

        <div class="middle-row">
            <div class="block block-1">1</div>
        </div>
        
        <div class="middle-row">
            <div class="block block-2">2</div>
        </div>

        
        
        <div class="middle-row">
            <div class="block block-3"><img src="Лого.png" style="max-width: 100%; max-height: 100%;"></div>
            <div class="block block-4">4</div>
        </div>
        
        <div class="bottom-row">
            <div class="block block-5">подвал</div>
        </div>
    </div>
</body>
</html>
