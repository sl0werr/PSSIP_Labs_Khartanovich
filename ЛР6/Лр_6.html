<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модульная сетка CSS Grid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .grid-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: 100px;
        }
        
        .item-1 { grid-column: 1 / -1; }
        .item-2 { grid-column: span 2; }
        .item-3 { grid-column: span 2; }
        .item-4 { grid-column: span 2; }
        .item-5 { grid-column: span 3; }
        .item-6 { grid-column: span 3; }
        .item-7 { grid-column: 1 / -1; }
        .item-8 { grid-column: span 3; }
        .item-9 { grid-column: span 3; }
        .item-10 { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item item-1">1</div>
        <div class="grid-item item-2">2</div>
        <div class="grid-item item-3">3</div>
        <div class="grid-item item-4">4</div>
        <div class="grid-item item-5">5</div>
        <div class="grid-item item-6">6</div>
        <div class="grid-item item-7">7</div>
        <div class="grid-item item-8">8</div>
        <div class="grid-item item-9">9</div>
        <div class="grid-item item-10">10</div>
    </div>
</body>
</html>
