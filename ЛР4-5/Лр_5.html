<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модульная сетка Flexbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
        }
        
        .row {
            display: flex;
            gap: 15px;
        }
        
        .item {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: 100px;
        }
        
        .full-width {
            width: 100%;
            height: 120px;
        }
        
        .half-width {
            width: calc(50% - 7.5px);
        }
        
        .third-width {
            width: calc(33.333% - 10px);
        }
    </style>
</head>
<body>
    <div class="grid-container">

        <div class="row">
            <div class="item full-width">1</div>
        </div>
        
        <div class="row">
            <div class="item third-width">2</div>
            <div class="item third-width">3</div>
            <div class="item third-width">4</div>
        </div>
        
        <div class="row">
            <div class="item half-width">5</div>
            <div class="item half-width">6</div>
        </div>

        <div class="row">
            <div class="item full-width">7</div>
        </div>

        <div class="row">
            <div class="item half-width">8</div>
            <div class="item half-width">9</div>
        </div>

        <div class="row">
            <div class="item full-width">10</div>
        </div>
    </div>
</body>
</html>
